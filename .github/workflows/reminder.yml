name: Daily Special Dates Reminder

on:
  schedule:
    - cron: '0 8 * * *' # Ejecutar todos los días a las 8:00 AM UTC
  workflow_dispatch: # Permitir ejecución manual para pruebas

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run reminder script
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          PARTNER_EMAIL: ${{ secrets.PARTNER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python .github/scripts/reminder.py
